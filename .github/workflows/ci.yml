name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the Node major used across every job —
  # keeps the install steps in sync without scattering version numbers.
  # Node 22 is the active LTS as of late 2024; Node 20 entered EOL in
  # April 2026 so all jobs run on the supported line.
  NODE_VERSION: "22"

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      SESSION_SECRET: ci-build-only-32-character-placeholder-value
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Install with the default NODE_ENV so devDependencies (typescript,
      # prettier, eslint, prisma CLI, tailwind, etc.) are present. Setting
      # NODE_ENV=production at install time would silently skip them and
      # the CLI tools below would fall back to whatever happens to be on
      # the runner's PATH.
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (unit + component)
        run: npm run test

      # Guard rail: the checklist-first worker + Admin Worker
      # features must keep their test coverage. If any of these
      # files are missing on main, CI fails fast — a quiet deletion
      # can't silently regress the feature.
      #
      # The legacy diagnostic / saints-feast / ingestion-log tests
      # this list used to enforce were removed in commit c7c4d60
      # ("refactor: replace scraper-first ingestion with
      # approved-checklist-first worker"); their features were
      # replaced by the checklist-first worker + the Admin Worker
      # engine, which carry their own tests under tests/worker/ and
      # tests/admin-worker/.
      - name: Ensure worker + admin-worker feature tests exist
        run: |
          set -e
          for f in \
            tests/checklist/build-queue.test.ts \
            tests/checklist/source-validation.test.ts \
            tests/checklist/diagnostics.test.ts \
            tests/admin-worker/strict-qa.test.ts \
            tests/admin-worker/quality-v2.test.ts \
            tests/admin-worker/publish-orchestrator.test.ts \
            tests/admin-worker/final-brain.test.ts \
            tests/admin-worker/verifiers-fail-closed.test.ts \
            tests/admin-worker/rollback-ledger.test.ts \
            tests/admin-worker/state.test.ts \
            tests/admin-worker/modes.test.ts \
            tests/admin-worker/decisions.test.ts \
            tests/admin-worker/planner.test.ts \
            tests/admin-worker/deletion.test.ts \
            tests/admin-worker/security-defender.test.ts \
            tests/admin-worker/defender-ban.test.ts \
            tests/admin-worker/post-publish.test.ts \
            tests/admin-worker/post-publish-probe.test.ts \
            tests/admin-worker/homepage-designer.test.ts \
            tests/admin-worker/homepage-mutator.test.ts \
            tests/admin-worker/source-reputation.test.ts \
            tests/admin-worker/pdf.test.ts \
            tests/admin-worker/monthly-report-job.test.ts \
            tests/admin-worker/metrics.test.ts \
            tests/admin-worker/rule-categories.test.ts \
            tests/components/HomeToday.test.tsx \
            ; do
            if [ ! -f "$f" ]; then
              echo "Missing required worker / admin-worker test: $f" >&2
              exit 1
            fi
          done

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  audit:
    name: Dependency audit (blocking — high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      # `audit` exits non-zero on any vulnerability at or above the level.
      # High is the minimum bar that must block merges; moderate is
      # surfaced as advisory in the `advisories` job below.
      - name: Audit (high+ blocks)
        run: npm audit --audit-level=high

  advisories:
    name: Dependency advisories (moderate — non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Advisory only: keep visibility on moderate-severity issues without
    # blocking the merge queue. Flip continue-on-error off if a moderate
    # advisory ever needs to become a hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit (moderate+ — advisory only)
        run: npm audit --audit-level=moderate

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: viafidei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/viafidei_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/viafidei_test
      SESSION_SECRET: integration-test-only-secret-must-be-32-characters
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Apply migrations against the test database
        run: npx prisma migrate deploy
      - name: Run integration tests
        run: npm run test:integration

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: viafidei_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/viafidei_e2e_test
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/viafidei_e2e_test
      SESSION_SECRET: e2e-test-only-secret-must-be-32-characters-long-x
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Apply migrations + seed
        run: |
          npx prisma migrate deploy
          npm run db:seed || true
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      SESSION_SECRET: ci-build-only-32-character-placeholder-value
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install with the default NODE_ENV so devDependencies (typescript,
      # prettier, eslint, prisma CLI, tailwind, etc.) are present. Setting
      # NODE_ENV=production at install time would silently skip them, leaving
      # `tsc` / `prettier` to fall back to whatever happens to be on the
      # runner's PATH — which is how this job started failing once the
      # runner shipped a newer TypeScript that errors on the `baseUrl`
      # deprecation in tsconfig.json.
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
